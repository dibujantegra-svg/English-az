<title>English A–Z</title>

<style>
:root {
  --bg: #0e0020;
  --surface: #1a0533;
  --surface2: #240a44;
  --accent: #c084fc;
  --accent2: #f0abfc;
  --gold: #fbbf24;
  --text: #f3e8ff;
  --muted: #a78bca;
  --card-bg: #1e0a3a;
  --card-border: #3b1060;
  --radius: 18px;
  --radius-sm: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

#splash {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; gap: 16px;
  animation: fadeOut 0.5s ease 1.8s forwards;
}
#splash h1 { font-family: 'Syne', sans-serif; font-size: 52px; font-weight: 800; color: var(--accent); letter-spacing: -2px; }
#splash p { color: var(--muted); font-size: 15px; }
.splash-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; animation: bounce 0.8s ease infinite; }
.splash-dot:nth-child(2) { animation-delay: 0.15s; background: var(--accent2); }
.splash-dot:nth-child(3) { animation-delay: 0.3s; background: var(--gold); }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes fadeOut { to { opacity:0; pointer-events:none; } }

#app { height: 100dvh; display: flex; flex-direction: column; opacity: 0; animation: fadeIn 0.4s ease 2s forwards; }
@keyframes fadeIn { to { opacity:1; } }

header { padding: 14px 16px 10px; background: linear-gradient(180deg, var(--surface) 0%, transparent 100%); flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.app-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
.stats-row { display: flex; gap: 8px; align-items: center; }
.stats-pill { display: inline-flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--card-border); border-radius: 30px; padding: 3px 10px; font-size: 12px; color: var(--muted); }
.stats-pill span { color: var(--gold); font-weight: 700; font-family: 'Syne', sans-serif; }
.progress-bar { width: 100%; height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 4px; transition: width 0.4s ease; }
.letter-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.letter-scroll::-webkit-scrollbar { display: none; }
.letter-btn { flex-shrink: 0; width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--card-border); background: var(--surface2); color: var(--muted); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.letter-btn.active { background: var(--accent); color: #0e0020; border-color: var(--accent); box-shadow: 0 0 14px #c084fc44; }
.letter-btn.done { border-color: #3b1060; color: var(--gold); }

.section-title { padding: 10px 16px 6px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0; }

.word-grid { flex: 1; overflow-y: auto; padding: 0 12px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; scrollbar-width: none; }
.word-grid::-webkit-scrollbar { display: none; }

.word-card { background: var(--card-bg); border: 1.5px solid var(--card-border); border-radius: 16px; padding: 12px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; min-height: 110px; display: flex; flex-direction: column; justify-content: space-between; user-select: none; }
.word-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #c084fc08, transparent); opacity: 0; transition: opacity 0.2s; }
.word-card:active { transform: scale(0.97); }
.word-card.revealed { border-color: #7e22ce; background: #200640; }
.word-card.revealed::before { opacity: 1; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 4px; }
.card-emoji { font-size: 26px; flex-shrink: 0; }
.speak-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--card-border); background: var(--surface2); color: var(--muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.speak-btn:active { transform: scale(0.9); background: var(--accent); color: #0e0020; }
.speak-btn.speaking { background: var(--accent); color: #0e0020; animation: pulse 0.6s ease infinite alternate; }
@keyframes pulse { from { box-shadow: 0 0 0 0 #c084fc44; } to { box-shadow: 0 0 0 6px #c084fc00; } }

.card-word { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.2; margin-top: 6px; }
.card-translation { font-size: 12px; color: var(--accent2); margin-top: 3px; font-weight: 300; font-style: italic; max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.card-example { font-size: 10px; color: var(--muted); margin-top: 4px; line-height: 1.4; max-height: 0; overflow: hidden; transition: max-height 0.3s ease 0.05s; }
.word-card.revealed .card-translation { max-height: 40px; }
.word-card.revealed .card-example { max-height: 60px; }
.card-tap { font-size: 9px; color: var(--muted); margin-top: 6px; opacity: 0.5; }
.word-card.revealed .card-tap { display: none; }
.card-check { position: absolute; bottom: 8px; right: 8px; width: 18px; height: 18px; border-radius: 50%; background: var(--gold); display: none; align-items: center; justify-content: center; font-size: 10px; }
.word-card.revealed .card-check { display: flex; }

.bottom-bar { flex-shrink: 0; padding: 8px 12px 20px; background: linear-gradient(0deg, var(--surface) 0%, transparent 100%); display: flex; gap: 8px; }
.btn-action { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--card-border); background: var(--surface2); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-action:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #0e0020; border-color: var(--accent); font-weight: 700; }
.btn-primary:active { background: #a855f7; }

#toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--gold); color: #0e0020; padding: 9px 18px; border-radius: 30px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 50; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.speech-notice { font-size: 10px; color: var(--muted); text-align: center; padding: 4px 0 0; opacity: 0.6; flex-shrink: 0; }
</style>

const letters = Object.keys(vocab);
let currentIdx = 0;
let revealed = {};
let totalLearned = 0;

// Count total words
const totalWords = Object.values(vocab).reduce((s, a) => s + a.length, 0);
document.getElementById('total-count').textContent = totalWords;

// Speech
let synth = window.speechSynthesis;
let voices = [];
let speechSupported = !!synth;
let currentSpeakBtn = null;

function loadVoices() {
  voices = synth.getVoices();
}
if (speechSupported) {
  loadVoices();
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
  document.getElementById('speech-notice').textContent = '🔊 Toca el botón de sonido en cada tarjeta para escuchar la pronunciación';
} else {
  document.getElementById('speech-notice').textContent = '⚠️ Tu navegador no soporta pronunciación. Usa Chrome o Safari.';
}

function speak(word, btnEl) {
  if (!speechSupported) return;
  synth.cancel();
  if (currentSpeakBtn) currentSpeakBtn.classList.remove('speaking');

  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.pitch = 1;

  // Try to get an English voice
  const enVoice = voices.find(v => v.lang.startsWith('en'));
  if (enVoice) utter.voice = enVoice;

  btnEl.classList.add('speaking');
  currentSpeakBtn = btnEl;

  utter.onend = () => { btnEl.classList.remove('speaking'); currentSpeakBtn = null; };
  utter.onerror = () => { btnEl.classList.remove('speaking'); currentSpeakBtn = null; };
  synth.speak(utter);
}

function getRevealed(letter) {
  if (!revealed[letter]) revealed[letter] = new Set();
  return revealed[letter];
}

function renderNav() {
  const nav = document.getElementById('letter-nav');
  nav.innerHTML = letters.map((l, i) => {
    const done = getRevealed(l).size === vocab[l].length;
    const active = i === currentIdx;
    return `<button class="letter-btn${active?' active':''}${done&&!active?' done':''}" onclick="selectLetter(${i})">${l}</button>`;
  }).join('');
  const btn = nav.querySelector('.active');
  if (btn) btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function renderWords() {
  const letter = letters[currentIdx];
  const words = vocab[letter];
  const revSet = getRevealed(letter);
  document.getElementById('section-title').textContent = `Letra ${letter} — ${words.length} palabras`;
  document.getElementById('word-grid').innerHTML = words.map((w, i) => {
    const isRev = revSet.has(i);
    return `<div class="word-card${isRev?' revealed':''}" onclick="flipCard('${letter}',${i})">
      <div>
        <div class="card-top">
          <span class="card-emoji">${w.emoji}</span>
          <button class="speak-btn" id="sbtn-${i}" onclick="event.stopPropagation();speak('${w.word.replace(/'/g,"\\'")}',this)" title="Escuchar pronunciación">🔊</button>
        </div>
        <div class="card-word">${w.word}</div>
        <div class="card-translation">${w.es}</div>
        <div class="card-example">${w.ex}</div>
        ${!isRev?'<div class="card-tap">Toca para traducción</div>':''}
      </div>
      <div class="card-check">✓</div>
    </div>`;
  }).join('');
  updateProgress();
}

function flipCard(letter, i) {
  const revSet = getRevealed(letter);
  if (!revSet.has(i)) {
    revSet.add(i);
    totalLearned++;
    document.getElementById('total-learned').textContent = totalLearned;
    if (revSet.size === vocab[letter].length) showToast('¡Letra completada! 🎉');
  } else {
    revSet.delete(i);
    totalLearned = Math.max(0, totalLearned - 1);
    document.getElementById('total-learned').textContent = totalLearned;
  }
  renderWords();
  renderNav();
}

function selectLetter(i) {
  currentIdx = i;
  renderNav();
  renderWords();
}

function nextLetter() { if (currentIdx < letters.length-1) selectLetter(currentIdx+1); }
function prevLetter() { if (currentIdx > 0) selectLetter(currentIdx-1); }

function updateProgress() {
  const pct = Math.round(((currentIdx+1)/letters.length)*100);
  document.getElementById('progress').style.width = pct+'%';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Swipe
let startX = 0;
document.getElementById('word-grid').addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
document.getElementById('word-grid').addEventListener('touchend', e => {
  const diff = startX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 60) diff > 0 ? nextLetter() : prevLetter();
}, {passive:true});

renderNav();
renderWords();
</script>
</body>
</html>
